name: Feature Request
description: Suggest an idea for this project
title: '[Feature] '
labels: ['enhancement']
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature request! Please fill out the template below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Describe the problem you're trying to solve.
        Why is this feature needed?
      placeholder: e.g., I often need to...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe the solution you'd like.
        How should it work?
      placeholder: e.g., Add a button to...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        Describe any alternative solutions or features you've considered.
      placeholder: I considered using...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or diagrams about the feature request here.
      placeholder: Any screenshots, diagrams, etc.
